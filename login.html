<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Club</title>
<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<style>
 body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f9ff;
  overflow-x: hidden;
}
 
i{
  color:#2c2a99;
  font-size: 34px;
}

.container{
  display:flex; 
    align-items:center;
    justify-content:center;
    gap:36px;   
    padding:16px; 
    max-height:720px; 
} 
.left{
  flex:1;
}
.right{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}
.right img{
  width:100%;
    max-height:700px;
  border-radius:10px;
  box-shadow:0 4px 8px rgba(0,0,0,0.1);
  object-fit:cover;
  height: auto;
}
.hide{
  display:none;
}
.container{
  background:#fff;
  border-radius:12px;   
  padding:20px  ;
  margin:40px auto  ; /* center and add vertical spacing */
  max-width:1000px; /* constrain width so it doesn't cover the whole page */
  width:90%;
  box-shadow:0 4px 8px rgba(0,0,0,0.1); 
}
h1{
  margin-bottom:10px;
}   
p{
  color:#555;
  margin-bottom:20px;
}
input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:14px;
}   
#log,#sign{
  width:95%;
  background:#3f37c9;
  color:#fff;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
  padding: 12px;
} 
#log:hover,#sign:hover{
  background:#2c2a99;
}
.switch{
  text-align:center;
  margin-top:15px;
  font-size:14px;
}
.switch span{
  color:#3f37c9;
  cursor:pointer;
}
.social{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.social button{
  background:#fff;
  color:#333;
  border:1px solid #ddd;
  padding:10px;
  border-radius:6px;
  font-size:14px;
  cursor:pointer;
}
.social button i{
  margin-right:8px;
}
@media(max-width:768px){
  .container{
    flex-direction:column;
    margin: 40px auto; /* reduce vertical margin on small screens */
    max-width: 90%;
    padding: 15px;
}
  .right{
    display:none;
  }
}
input{
  width:90%;
  padding:10px; /* smaller inputs */
  border:none;
  background:#f1f1ff;
  border-radius:8px;
  margin-bottom:12px; /* tighter spacing */
}
.radio-group,.radio-group1{
  display:flex;
  gap:15px;
  margin-bottom:15px;
  text-align: center;
}
.radio-group label,.radio-group1 label {
  font-size:14px;
}
.switch{
  text-align:center;
  margin-top:15px;
  font-size:14px;
}
.switch span{
  color:#5f3bff;
  cursor:pointer;
  font-weight:600;
}
#btn {
  background-color: #3f37c9;
  border: none;
  border-radius: 4px;
  padding: 6px 12px; /* 🔥 reduced padding */
  cursor: pointer;
  display: inline-block;
}
#btn a {
  color: white;
  text-decoration: none;
  padding: 0;  /* ❌ remove extra padding */
  margin: 0;
  display: inline;
}
</style>
</head>

<body>

     <nav>
    <div class="logo">
        <h2><i id="logo-icon" class="fa-solid fa-graduation-cap"></i> Student Club</h2>
    </div>

    <div class="menu-toggle" onclick="toggleMenu()">
        <i id="logo-icon" class="fa-solid fa-bars"></i>
    </div>

    <ul id="nav-links">
        <li><a href="./index.html" id="a2">Home</a></li>
        <li><a href="./features.html" id="a2">Features</a></li>
        <li><a href="./contact.html" id="a2">Contact</a></li>
        <li><button id="btn"><a href="./login.html" id="a2">Login</a></button></li>
    </ul>
</nav>
 
<div class="container">

  <!-- LEFT -->
  <div class="left">

    <!-- LOGIN -->
    <div id="loginBox">
      <h1 style="text-align: center;">LOGIN</h1>
      <p >Welcome back to Student Club</p>

      <input type="email" placeholder="Email" class="input1">
      <input type="password" placeholder="Password" class="input2">

      <button onclick="login()" id="log">Login</button>

      <div class="switch">
        Don’t have an account? <span onclick="showSignup()">Signup</span>
      </div>
    </div>
    


    <!-- SIGNUP -->
    <div id="signupBox" class="hide">
      <h2>SIGN UP</h2>
      <p>Create your account</p>

      <input type="email" placeholder="Email">
      <input type="text" placeholder="Mobile Number">
      <input type="password" placeholder="Create Password">
      <input type="password" placeholder="Confirm Password">
      <input type="number"   placeholder="Enter your age">
      <h3>Gender</h3>
      <div class="radio-group">
         <label><input type="radio" name="gender" checked>Male</label>
      <label><input type="radio" name="gender" checked>Female</label>
     </div>
     <h3>Role</h3>
     <div class="radio-group1">
        <label><input type="radio" name="role2" checked> Student</label>
        <label><input type="radio" name="role2"> Teacher</label>
      </div>

      <button id="sign">Signup</button>

      <div class="switch">
        Already have an account? <span onclick="showLogin()">Login</span>
      </div>

      <div class="social">
        <button><i class="fa-brands fa-google"></i> Login with Google</button>
        </div>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">
    <img id="loginImg" src="https://i.postimg.cc/y83WwfNR/IMG-20260114-WA0061.jpg" alt="Student studying together">
    <img id="signupImg" src="https://i.postimg.cc/X7mYcwgM/IMG-20260114-WA0062.jpg" alt="Students celebrating" class="hide" height="auto" >
  </div>

</div>

<script>
    
function toggleMenu() {
    const menu = document.getElementById("nav-links");
    menu.classList.toggle("active");
}

function showSignup(){
  document.getElementById("loginBox").classList.add("hide");
  document.getElementById("signupBox").classList.remove("hide");
  // swap illustrations
  const li = document.getElementById('loginImg');
  const si = document.getElementById('signupImg');
  if(li) li.classList.add('hide');
  if(si) si.classList.remove('hide');
}
function showLogin(){
  document.getElementById("signupBox").classList.add("hide");
  document.getElementById("loginBox").classList.remove("hide");
  // swap illustrations back
  const li = document.getElementById('loginImg');
  const si = document.getElementById('signupImg');
  if(si) si.classList.add('hide');
  if(li) li.classList.remove('hide');
}
function login() {
  let email = document.querySelector(".input1").value;
  let password = document.querySelector(".input2").value;

  if (email == "sudharshanjaggula605@gmail.com" && password == "sudha88907") {
    window.location.href = "./Students/studentdashboard.html";
  }
  else if (email == "aditya22@gmail.com" && password == "aditya22") {
    window.location.href = "./Teachers/teacherdashboard.html";
  }
  else if (email == "humera08@gmail.com" && password == "humera08") {
    window.location.href = "./Admin/admindashboard.html";
  }
  else {
    alert("Invalid credentials");
  }
}</script>

</body>
</html>
