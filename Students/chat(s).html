<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
    
}
body{
     background: #f4f9ff;
}
/* ================= TOP NAV ================= */
.top-nav{
    background:#2c2a99;
    color:white;
    padding:14px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    z-index:1000;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:20px;
    font-weight:bold;
}

.logo i{ cursor:pointer; }

.nav-actions{
    display:flex;
    gap:15px;
    align-items:center;
    font-size:14px;
}

/* ================= LAYOUT ================= */
.layout{
    display:grid;
    grid-template-columns:0px 1fr;
    transition:grid-template-columns 0.35s ease;
}

/* WHEN SIDEBAR OPEN */
.layout.show{
    grid-template-columns:220px 1fr;
}

/* ================= SIDEBAR ================= */
.sidebar{
    background:lightgrey;
    min-height:calc(100vh - 60px);
    border-right:1px solid #ddd;
    overflow:hidden;
    transition:0.35s ease;
}

.sidebar ul{
    list-style:none;
    padding-top:10px;
}

.sidebar li{
    padding:14px 18px;
    display:flex;
    align-items:center;
    gap:12px;
    cursor:pointer;
    transition:0.25s;
}

.sidebar li:hover{
    background:#e5efff;
    color:#2563eb;
}

.sidebar i{
    min-width:22px;
}

/* ACTIVE ITEM */
.sidebar li.active{
    background:#e5efff;
    color:#2563eb;
    border-left:4px solid #2563eb;
}

a{
    text-decoration:none;
    color:black;
}
/* ================= MOBILE RESPONSIVE FIX ================= */
@media (max-width: 768px) {

  /* TOP NAV */
  .top-nav {
    padding: 12px 14px;
  }

  .nav-actions span {
    display: none;
  }

  /* LAYOUT */
  .layout {
    grid-template-columns: 0 1fr;
  }

  .layout.show {
    grid-template-columns: 60px 1fr;
  }

  /* SIDEBAR */
  .sidebar span {
    display: none;
  }

  .sidebar li {
    justify-content: center;
  }
}
/* ================= MAIN CONTENT ================= */
.content{   
    /* padding:20px; */
     padding: 20px;
    display: flex;
    gap: 20px;
    height: calc(100vh - 80px);
}
.chats{
    /* width:30%;
    float:left;
    background:white;
    padding:10px;
    border-radius:5px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    height:600px;
    overflow-y:auto; */
       width: 30%;
    background: white;
    padding: 10px;
    border-radius: 5px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    overflow-y: auto;
}
.chats input{
    width:100%;
    padding:8px;
    margin-bottom:10px;
    border:1px solid black;
    border-radius:5px;
}
.chats-content #users{
    display:flex;
    align-items:center;
    gap:10px;
    padding:8px;
    border-bottom:1px solid #f0f0f0;
    cursor:pointer;
    background-color: rgb(232,232,255);
    transition:0.25s;
    margin: 5px 0;
}
.chats-content #users:hover{
    background:#f9f9f9;
}   
.chatnav{
    /* margin-left:12%;
    background:white;
    padding:10px;
    border-radius:5px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    height:600px;
    display:flex;
    flex-direction:column; */
      width: 70%;
    background: white;
    padding: 10px;
    border-radius: 5px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
}
.chatwith{
    display:flex;
    align-items:center;
    gap:10px;
    border-bottom:1px solid #f0f0f0;
    padding-bottom:10px;
}   
.messages{
    flex:1;
    overflow-y:auto;
    padding:10px 0;
}
.chat-message{
    max-width:70%;
    margin-bottom:10px;
    padding:8px 12px;
    border-radius:15px;
    line-height:1.4;
}
.chat-message.incoming{
    background:#f1f0f0;
    align-self:flex-start;
}
.chat-message.outgoing{
    background:#2563eb;
    color:white;
    align-self:flex-end;
    margin-left: auto;
}
.message-input{
    display:flex;
    gap:10px;
    border-top:1px solid #f0f0f0;
    padding-top:10px;
}
.message-input input{
    flex:1;
    padding:8px;
    border:1px solid #ccc;
    border-radius:5px;
}   
.message-input button{
    padding:8px 16px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}/* ================= MOBILE CHAT VIEW ================= */
@media (max-width: 768px) {

  .content {
    padding: 10px;
  }

  /* User list */
  .chats {
    width: 100%;
    float: none;
    height: calc(100vh - 120px);
  }

  /* Chat screen */
  .chatnav {
    display: none;
    width: 100%;
    height: calc(100vh - 120px);
    margin-left: 0;
  }

  /* When chat is open */
  .chat-open .chats {
    display: none;
  }

  .chat-open .chatnav {
    display: flex;
  }

  /* Back button */
  .back-btn {
    display: block;
    font-size: 14px;
    color: #2563eb;
    cursor: pointer;
    margin-bottom: 5px;
  }
}


</style>
</head>

<body>

<!-- ================= TOP NAV ================= -->
<header class="top-nav">
    <div class="logo">
        <i class="fa-solid fa-bars" onclick="side()"></i>
        <i class="fa-solid fa-graduation-cap"></i>
        <span>Student Club</span>
    </div>

    <div class="nav-actions">
        <a href="notification(s).html" style="color:white">
            <i class="fa-regular fa-bell"></i>
        </a>

        <a href="studentprofile.html" style="color:white">
            <i class="fa-solid fa-user"></i>
            <span>Sudharshan</span>
        </a>

        <!-- LOGOUT ICON  -->
        <i class="fa-solid fa-right-from-bracket" onclick="logout()" style="cursor:pointer;"></i>

    </div>
</header>

<div class="layout" id="layout">

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar">
    <ul>
        <li ><a href="studentdashboard.html"><i class="fa-solid fa-grip"></i><span>Dashboard</span></a></li>
        <li><a href="q&a(s).html"><i class="fa-solid fa-clipboard-question"></i><span>Q&A</span></a></li>
        <li><a href="studymaterial(s).html"><i class="fa-solid fa-file-lines"></i><span>Study Materials</span></a></li>
        <li><a href="video(s).html"><i class="fa-solid fa-video"></i><span>Video Learning</span></a></li>
        <li><a href="liveclasses(s).html"><i class="fa-brands fa-youtube"></i><span>Live Classes</span></a></li>
        <li><a href="course.html"><i class="fa-solid fa-book-open"></i><span>Courses</span></a></li>
        <li><a href="findpeople(s).html"><i class="fa-solid fa-users"></i><span>Find People</span></a></li>
        <li class="active"><a href="chat(s).html"><i class="fa-solid fa-comment-dots"></i><span>Chat</span></a></li>
        <li><a href="learningprogress(s).html"><i class="fa-solid fa-arrow-trend-up"></i><span>Progress</span></a></li>
        
    </ul>
</aside>

<!-- ================= MAIN CONTENT ================= -->
<main class="content">
    
<div class="chats"><br>
    <input type="text" placeholder="🔍 Search conversations">
    <div class="chats-content">
        <div id="users" onclick="openChat('Aditya sir')">
            <img src="https://i.pinimg.com/736x/de/8e/ea/de8eea6f67a5fc92996ff6d48b3bd690.jpg" width="50" height="50" style="border-radius:50%">
            <div>
                <h3>Aditya sir</h3>
                <p>How are you?</p>
            </div>
            </div>
            <div id="users" onclick="openChat('Naaz Frnd')">

            <img src="https://i.pinimg.com/736x/de/8e/ea/de8eea6f67a5fc92996ff6d48b3bd690.jpg" width="50" height="50" style="border-radius:50%">
            <div>
                <h3>Naaz Frnd</h3>
                <p>Hello bro...</p>
            </div>
 
        </div>
    </div>
</div>

<div class="chatnav">
    <div class="chatwith">
    <span class="back-btn" onclick="backToUsers()">⬅ Back</span>
    <img src="https://i.pinimg.com/736x/de/8e/ea/de8eea6f67a5fc92996ff6d48b3bd690.jpg"
         width="50" height="50" style="border-radius:50%">
    <div>
        <h3 id="chatUserName">Aditya sir</h3>
        <p>online</p>
    </div>
</div>


    <div class="messages">
        <div class="chat-message incoming">Hey! how are you?</div>
        <div class="chat-message outgoing">I am fine!</div>
        <div class="chat-message incoming">What about the project?</div>
    </div>

    <div class="message-input">
        <input type="text" placeholder="Type a message...">
        <button>Send</button>
    </div>
</div>

</div>

<script>
function side(){
    document.getElementById("layout").classList.toggle("show");
}
function logout() {
    window.location.href = "../login.html";
}
 
function openChat(name) {
    document.body.classList.add("chat-open");
    document.getElementById("chatUserName").innerText = name;
}

/* BACK TO USER LIST */
function backToUsers() {
    document.body.classList.remove("chat-open");
}
</script>



</body>
</html>
