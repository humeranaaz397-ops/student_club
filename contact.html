<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Club</title>
<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f9ff;
}

i{
  color:#2c2a99;
  font-size: 34px;
}

/* HEADINGS */
h1, h3{
  text-align: center;
  color: #2c2a99;
}

.contact-section{
  padding: 40px 20px 80px 20px;
  display: flex;
  justify-content: center;
}

.contact-card{
  position: relative;
  max-width: 700px;
  width: 100%;
  background: rgba(255,255,255,0.95);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 15px 30px rgba(0,0,0,0.15);
}

.contact-card::before{
  content: "";
  position: absolute;
  inset: 0;
  background: url("https://i.postimg.cc/s2dGXDRf/file-00000000838471fab359ef4f48bdb584.png") center/cover no-repeat;
  opacity: 0.15;
  z-index: 1;
}


.contact-form{
  position: relative;
  z-index: 2;
  padding: 30px;
}

.contact-form label{
  display: block;
  margin-top: 15px;
  font-weight: 600;
  color: #333;
}

.contact-form input,
.contact-form textarea{
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 16px;
}

.contact-form button{
  margin-top: 20px;
  width: 100%;
  padding: 14px;
  font-size: 16px;
  background: #3f37c9;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

.contact-form button:hover{
  background: #2c2a99;
}


.foot{
     background-color: #2c2a99;
            color: white;
            text-align: center;
            padding: 18px;
            font-size: 16px;
        } 
</style>
</head>

<body>

     <nav>
    <div class="logo">
        <h2><i id="logo-icon" class="fa-solid fa-graduation-cap"></i> Student Club</h2>
    </div>

    <div class="menu-toggle" onclick="toggleMenu()">
        <i id="logo-icon" class="fa-solid fa-bars"></i>
    </div>

    <ul id="nav-links">
        <li><a href="./index.html" id="a2">Home</a></li>
        <li><a href="./features.html" id="a2">Features</a></li>
        <li><button id="btn"><a href="./contact.html" >Contact</a></button></li>
        <li><a href="./login.html" id="a2">Login</a></li>
    </ul>
</nav>
  

<h1>We'd love to hear from you!</h1>
<h3>Have a questions or suggestions? <strong>Let's hear it!</strong></h3>

<section class="contact-section">
  <div class="contact-card">
    <form class="contact-form">
      <label>Name</label>
      <input type="text" placeholder="Enter your name" required>

      <label>Email</label>
      <input type="email" placeholder="Enter your email" required>

      <label>Message</label>
      <textarea rows="5" placeholder="Enter your message" required></textarea>

      <button type="submit">Send Message</button>
    </form>
  </div>
</section>
<footer class="foot">@ 2026 Student Club All rights reseved</footer>


<script>
function toggleMenu() {
    const menu = document.getElementById("nav-links");
    menu.classList.toggle("active");
}
</script>
</body>
</html>
