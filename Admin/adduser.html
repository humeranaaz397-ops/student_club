<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

  <style>
    .container{
  display:flex; 
    align-items:center;
    justify-content:center;  
    padding:16px; 
    max-height:720px; 
}
.container{
  background:#fff;
  border-radius:12px;   
  padding:0px 20px 20px 50px;
  margin:40px auto; /* center and add vertical spacing */
  max-width:500px; /* constrain width so it doesn't cover the whole page */
  width:80%;
  box-shadow:0 4px 8px rgba(0,0,0,0.1); 
}
h2{
  margin-bottom:10px;
}   
p{
  color:#555;
  margin-bottom:20px;
}
input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:14px;
}   
button{
  width:95%;
  background:#3f37c9;
  color:#fff;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
  padding: 12px;
} 
button:hover{
  background:#2c2a99;
}
@media(max-width:768px){
  .container{
    flex-direction:column;
    margin:40PX auto;/* reduce vertical margin on small screens */
    max-width: 90%;
    padding: 15px;
}}
input{
  width:90%;
  padding:10px; /* smaller inputs */
  border:none;
  background:#f1f1ff;
  border-radius:8px;
  margin-bottom:12px; /* tighter spacing */
}
.radio-group,.radio-group1{
  display:flex;
  gap:15px;
  margin-bottom:15px;
  text-align: center;
}
.radio-group label,.radio-group1 label {
  font-size:14px;
}
.switch{
  text-align:center;
  margin-top:15px;
  font-size:14px;
}
.switch span{
  color:#5f3bff;
  cursor:pointer;
  font-weight:600;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}
           
/* ================= TOP NAV ================= */
.top-nav{
    background:#2c2a99;
    color:white;
    padding:14px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    z-index:1000;
}

.logo{
    display:flex;
    
    align-items:center;
    gap:10px;
    font-size:20px;
    font-weight:bold;
}

.logo i{ cursor:pointer; }

.nav-actions{
    display:flex;
    gap:15px;
    align-items:center;
    font-size:14px;
}

/* ================= LAYOUT ================= */
.layout{
    display:grid;
    grid-template-columns:0px 1fr;
    transition:grid-template-columns 0.35s ease;
}

/* WHEN SIDEBAR OPEN */
.layout.show{
    grid-template-columns:220px 1fr;
}

/* ================= SIDEBAR ================= */
.sidebar{
    background:lightgrey;
    min-height:calc(100vh - 60px);
    border-right:1px solid #ddd;
    overflow:hidden;
    transition:0.35s ease;
}

.sidebar ul{
    list-style:none;
    padding-top:10px;
}

.sidebar li{
    padding:14px 18px;
    display:flex;
    align-items:center;
    gap:12px;
    cursor:pointer;
    transition:0.25s;
}

.sidebar li:hover{
    background:#e5efff;
    color:#2563eb;
}

.sidebar i{
    min-width:22px;
}

/* ACTIVE ITEM */
.sidebar li.active{
    background:#e5efff;
    color:#2563eb;
    border-left:4px solid #2563eb;
}
/* ================= FOOTER ================= */


        .foot{
     background-color: #2c2a99;
            color: white;
            text-align: center;
            padding: 18px;
            font-size: 16px;
        }

/* ================= MOBILE ================= */
@media(max-width:768px){
    .layout.show{
        grid-template-columns:60px 1fr;
    }

    .sidebar span{
        display:none;
    }
}

a{
    text-decoration:none;
    color:black;
}
    /* ================= MOBILE RESPONSIVE ================= */
@media (max-width: 768px) {

  /* TOP NAV */
  .top-nav {
    padding: 12px 14px;
  }

  .nav-actions span {
    display: none;
  }

  /* LAYOUT */
  .layout {
    grid-template-columns: 0px 1fr;
  }

  .layout.show {
    grid-template-columns: 60px 1fr;
  }

  /* SIDEBAR */
  .sidebar span {
    display: none;
  }

  .sidebar li {
    justify-content: center;
  }
}
</style>
</head>
<body>
  
    <!-- ================= TOP NAV ================= -->
<header class="top-nav">
    <div class="logo">
        <i class="fa-solid fa-bars" onclick="side()"></i>
        <i class="fa-solid fa-graduation-cap"></i>
        <span>Student Club</span>
    </div>

    <div class="nav-actions">
        <a href="notification.html" style="color:white">
            <i class="fa-regular fa-bell"></i>
        </a>

        <a href="adminprofile.html" style="color:white">
            <i class="fa-solid fa-user"></i>
            <span>Humera</span>
        </a>

        <!-- LOGOUT ICON (UNCHANGED) -->
         <i class="fa-solid fa-right-from-bracket" onclick="logout()" style="cursor:pointer;"></i>
    </div>
</header>

<div class="layout" id="layout">

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar">
    <ul>
        
    <li ><a href="admindashboared.html"><i class="fa-solid fa-grip"></i><span>Dashboard</span></a></li>
    <li><a href="manage.html"><i class="fa-solid fa-users"></i><span>Manage Users</span></a></li>
    <li class="active"><a href="controlpanel.html"><i class="fa-solid fa-gamepad"></i><span>Control Panel</span></a></li>
    <li ><a href="content.html"><i class="fa-solid fa-file"></i><span>Content</span></a></li>
    <li><a href="analytics.html"><i class="fa-solid fa-chart-line"></i><span>Analytics</span></a></li>
    <li><a href="reports.html"><i class="fa-solid fa-flag"></i><span>Reports</span></a></li>
    <li><a href="settings.html"><i class="fa-solid fa-gear"></i><span>Settings</span></a></li>
  
         </ul>
</aside>

  <div class="container">
    <div>
      <h2>Add User</h2>
      <p>Create your account</p>

      <input type="email" placeholder="Email">
      <input type="text" placeholder="Mobile Number">
      <input type="password" placeholder="Create Password">
      <input type="password" placeholder="Confirm Password">
      <input type="number"   placeholder="Enter your age">
      <h3>Gender</h3>
      <div class="radio-group">
         <label><input type="radio" name="gender" checked>Male</label>
      <label><input type="radio" name="gender" checked>Female</label>
     </div>
     <h3>Role</h3>
     <div class="radio-group1">
        <label><input type="radio" name="role2" checked> Student</label>
        <label><input type="radio" name="role2"> Teacher</label>
         <label><input type="radio" name="role2"> Admin</label>
      </div>

      <button>Signup</button>

      <div class="switch">
        Already have an account? <span onclick="showLogin()">Login</span>
      </div>
</div></div>
 </div>
  <footer class="foot">@ 2026 Student Club All rights reseved</footer>

<script>
function side(){
    document.getElementById("layout").classList.toggle("show");
}


function logout() {
    window.location.href = "../login.html";
}
</script>
</body>
</html>
